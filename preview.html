<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #e8e8ee;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ---- cat stage ---- */
    #cat-stage {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 170px;
      cursor: grab;
    }
    #cat-elastic {
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 150px;
      height: 150px;
      margin-left: -75px;
      transform-origin: 50% 100%;
      will-change: transform;
    }
    /* drag pose spans the whole window so the long cat can dangle */
    .pose-drag {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 240px;
      margin-left: -120px;
      cursor: grabbing;
    }
    #cat-bounce { width: 100%; height: 100%; }
    #cat-stage.excited #cat-bounce {
      animation: pet-bounce 0.45s ease-in-out infinite;
      transform-origin: 50% 100%;
    }
    @keyframes pet-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
    .pose {
      position: absolute;
      inset: 0;
      display: none;
    }
    .pose.visible { display: block; }
    .pose svg { width: 100%; height: 100%; }

    /* ---- steam (typing too fast) ---- */
    .stm { opacity: 0; }
    #cat-stage.hot .stm { animation: pet-steam 1.5s ease-out infinite; }
    #cat-stage.hot .s2 { animation-delay: 0.45s; }
    #cat-stage.hot .s3 { animation-delay: 0.9s; }
    @keyframes pet-steam {
      0% { opacity: 0; transform: translateY(0); }
      25% { opacity: 0.85; }
      100% { opacity: 0; transform: translateY(-7px); }
    }

    /* ---- moods (idle pose) ---- */
    #cat-stage.lonely .eye-l-blink,
    #cat-stage.lonely .eye-r-blink { transform: scaleY(0.45); }
    #cat-stage.lonely [id$="-ear-left"] {
      transform: rotate(-16deg); transform-origin: 8px 10px;
    }
    #cat-stage.lonely [id$="-ear-right"] {
      transform: rotate(16deg); transform-origin: 20px 10px;
    }
    .brow { opacity: 0; }
    #cat-stage.grumpy .brow { opacity: 1; }
    #cat-stage.grumpy [id$="-ear-left"] {
      transform: scaleY(0.5); transform-origin: 8px 10px;
    }
    #cat-stage.grumpy [id$="-ear-right"] {
      transform: scaleY(0.5); transform-origin: 20px 10px;
    }

    /* ---- note popup ---- */
    #popup {
      position: absolute;
      bottom: 180px;
      left: 10px;
      width: 300px;
      max-height: 290px;
      background: #ffffff;
      border: 2px solid #1a1a1a;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
      padding: 12px;
      box-sizing: border-box;
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    #popup.visible { display: flex; }
    #popup h3 { margin: 0; font-size: 13px; color: #1a1a1a; }
    #entries {
      overflow-y: auto;
      max-height: 120px;
      font-size: 12px;
      color: #333;
      display: none;
    }
    #entries.visible { display: block; }
    #entries .entry { margin-bottom: 5px; line-height: 1.35; }
    #entries .entry .t { color: #999; font-variant-numeric: tabular-nums; margin-right: 5px; }
    #noteInput {
      width: 100%;
      box-sizing: border-box;
      min-height: 54px;
      resize: none;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      padding: 7px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    #noteInput:focus { border-color: #1a1a1a; }
    #popupFooter { display: flex; justify-content: space-between; align-items: center; }
    #hint { font-size: 10px; color: #aaa; }
    #saveBtn {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
    }
    #saveBtn:hover { background: #d94f3d; }
    #toast {
      position: absolute;
      bottom: 155px;
      left: 10px;
      width: 300px;
      box-sizing: border-box;
      background: rgba(26, 26, 26, 0.92);
      color: #fff;
      font-size: 11px;
      line-height: 1.4;
      border-radius: 10px;
      padding: 8px 10px;
      display: none;
    }
    #toast.visible { display: block; }
  </style>
</head>
<body>
  <div id="popup">
    <h3 id="popupTitle">Quick note</h3>
    <div id="entries"></div>
    <textarea id="noteInput" placeholder="What just happened?"></textarea>
    <div id="popupFooter">
      <span id="hint">⌘/Ctrl+Enter to save · Esc to close</span>
      <button id="saveBtn">Save</button>
    </div>
  </div>
  <div id="toast"></div>
  <div id="cat-stage">
    <div id="cat-elastic"><div id="cat-bounce"></div></div>
  </div>
  <script>
  const ASSETS = {"idle.svg":"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"-8 -10 50 50\" shape-rendering=\"crispEdges\">\n  <defs>\n    <style>\n      :root {\n        --cat-color: #1A1A1A;\n        --cat-outline: #FFFFFF;\n        --cat-outline-width: 1;\n        --purr-face-x: 0px;\n        --purr-face-y: 0px;\n      }\n\n      .breathe-anim { transform-origin: 16px 22px; animation: breathe 3.5s infinite ease-in-out; }\n      /* 꼬리 회전축을 몸 안쪽 (24, 31)로 — 시작점이 거의 안 움직여서 분리 X */\n      .tail-sway { transform-origin: 24px 31px; animation: tail-sway 4s infinite ease-in-out; }\n      .whiskers-flex { transform-origin: 16px 16px; animation: whiskers 8s infinite ease-in-out; }\n      .ear-twitch-l { transform-origin: 8px 8px; animation: ear-twitch-l 11s infinite; }\n      .ear-twitch-r { transform-origin: 19px 9px; animation: ear-twitch-r 13s infinite; }\n\n      .eye-l-blink {\n        transform-origin: 9px 12.5px;\n      }\n      .eye-r-blink {\n        transform-origin: 18px 12.5px;\n      }\n      :root.blinking .eye-l-blink,\n      :root.blinking .eye-r-blink {\n        animation: blink 0.20s ease-in-out forwards;\n      }\n      .pupil-left {\n        transform-box: fill-box;\n        transform-origin: center;\n        transition: transform 0.24s ease-out;\n      }\n      .pupil-right {\n        transform-box: fill-box;\n        transform-origin: center;\n        transition: transform 0.24s ease-out;\n      }\n\n      :root.purring .eye-l-blink,\n      :root.purring .eye-r-blink {\n        animation:\n          purr-eye-close 0.22s ease-out forwards,\n          purr-eye-hide 0.01s linear 0.22s forwards;\n      }\n      .closed-eye-line {\n        opacity: 0;\n      }\n      :root.purring .closed-eye-line {\n        animation: purr-closed-eye-show 0.01s linear 0.22s forwards;\n      }\n      :root.purring #whiskers {\n        animation: purr-whiskers 0.42s steps(2, end) infinite;\n      }\n      :root.purring #face-js {\n        animation: purr-face 1.1s steps(2, end) infinite;\n      }\n      :root.purring .tail-sway {\n        animation: purr-tail-flutter 0.22s steps(2, end) infinite;\n      }\n\n      :root.hunting .breathe-anim {\n        animation: none;\n      }\n      :root.hunting #face-js {\n        transform-origin: 16px 16px;\n        animation: hunting-face-crouch 0.42s ease-out forwards;\n      }\n      :root.hunting .hunting-body-grow {\n        transform-origin: 16px 28px;\n        animation: hunting-body-grow 0.42s ease-out forwards;\n      }\n      :root.hunting #body {\n        transform-origin: 16px 28px;\n        animation: hunting-body-wiggle 0.68s ease-in-out infinite;\n      }\n      :root.hunting .hunting-tail-rise {\n        animation: hunting-tail-rise 0.42s ease-out forwards;\n      }\n      :root.hunting .tail-sway {\n        transform-origin: 24px 31px;\n        animation: hunting-tail-wiggle 0.68s ease-in-out 0.12s infinite;\n      }\n      :root.hunting .pupil-left,\n      :root.hunting .pupil-right {\n        transform: scale(1.33);\n      }\n      :root.hunting-return .breathe-anim {\n        animation: none;\n      }\n      :root.hunting-return #face-js {\n        transform-origin: 16px 16px;\n        animation: hunting-face-return 0.42s ease-out forwards;\n      }\n      :root.hunting-return .hunting-body-grow {\n        transform-origin: 16px 28px;\n        animation: hunting-body-return 0.42s ease-out forwards;\n      }\n      :root.hunting-return #body {\n        animation: none;\n      }\n      :root.hunting-return .hunting-tail-rise {\n        animation: hunting-tail-return 0.42s ease-out forwards;\n      }\n      :root.hunting-return .tail-sway {\n        animation: none;\n      }\n\n      #body-js, #face-js, #eyes-js {\n        transition: transform 0.18s ease-out;\n      }\n\n      @keyframes breathe {\n        0%, 100% { transform: scale(1, 1); }\n        50% { transform: scale(1.015, 0.985) translate(0, 0.4px); }\n      }\n      /* 꼬리 흔들기 각도 부드럽게 (8° → 5°/3°) */\n      @keyframes tail-sway {\n        0%, 100% { transform: rotate(0deg); }\n        35% { transform: rotate(5deg); }\n        75% { transform: rotate(-3deg); }\n      }\n      @keyframes whiskers {\n        0%, 90%, 100% { transform: scaleX(1); }\n        92%, 96% { transform: scaleX(1.06); }\n        94% { transform: scaleX(1); }\n      }\n      @keyframes ear-twitch-l {\n        0%, 88%, 100% { transform: rotate(0deg); }\n        90%, 94% { transform: rotate(-10deg); }\n        92% { transform: rotate(0deg); }\n      }\n      @keyframes ear-twitch-r {\n        0%, 78%, 100% { transform: rotate(0deg); }\n        80%, 84% { transform: rotate(10deg); }\n        82% { transform: rotate(0deg); }\n      }\n      /* 빠른 깜빡임: 4s 사이클, 96~99% 짧게 (총 0.12s) */\n      @keyframes blink {\n        0%, 100% { transform: scaleY(1); }\n        50%       { transform: scaleY(0.08); }\n      }\n      @keyframes purr-eye-close {\n        0% { transform: scaleY(1); }\n        100% { transform: scaleY(0.24); }\n      }\n      @keyframes purr-eye-hide {\n        to { opacity: 0; }\n      }\n      @keyframes purr-closed-eye-show {\n        to { opacity: 1; }\n      }\n      @keyframes purr-whiskers {\n        0%, 100% { transform: translateY(0); }\n        50% { transform: translateY(0.6px); }\n      }\n      @keyframes purr-face {\n        0%, 100% { transform: translate(var(--purr-face-x), var(--purr-face-y)); }\n        50% { transform: translate(var(--purr-face-x), calc(var(--purr-face-y) + 0.4px)); }\n      }\n      @keyframes purr-tail-flutter {\n        0%, 100% { transform: rotate(-5deg); }\n        50% { transform: rotate(12deg); }\n      }\n      @keyframes hunting-face-crouch {\n        0% { transform: translateY(0) scale(1); }\n        100% { transform: translateY(11px) scale(1); }\n      }\n      @keyframes hunting-body-grow {\n        0% { transform: scale(1); }\n        100% { transform: scale(1.2); }\n      }\n      @keyframes hunting-body-wiggle {\n        0%, 100% { transform: transl H19V16H20V15H21V12H22V8H21V5H20V4H19V3H17V2H15V1H7V2H4V3Z\"/>\n    </clipPath>\n    <clipPath id=\"idle-body-clip\">\n      <path transform=\"translate(3 19)\" d=\"M15 0V1H18V2H20V3H21V6H22V11H21V14H19V15H3V14H1V11H0V6H1V3H2V2H4V1H7V0H15Z\"/>\n    </clipPath>\n    <clipPath id=\"idle-leg-fl-clip\">\n      <path d=\"M6 29V26H7V25H10V26H11V28H12V31H13V32H14V35H13V36H9V35H8V31H7V29H6Z\"/>\n    </clipPath>\n    <clipPath id=\"idle-leg-fr-clip\">\n      <path d=\"M23 29V26H22V25H19V26H18V28H17V31H16V32H15V35H16V36H20V35H21V31H22V29H23Z\"/>\n    </clipPath>\n    <!-- tail-clip은 renderer.js의 installTailComponent가 동적 생성 -->\n  </defs>\n\n  <g id=\"idle-body-js\" filter=\"url(#idle-cat-outline)\">\n    <g class=\"breathe-anim\">\n      <!-- Tail — installTailComponent가 path/patches/clipPath 동적 주입.\n           회전축은 부모 .tail-sway에서 (24,31). -->\n      <g class=\"hunting-tail-rise\">\n        <g class=\"tail-sway\">\n          <g id=\"idle-tail\" fill=\"var(--cat-color)\" ><path transform=\"translate(20 24)\" d=\"M0 8V7H6V6H8V5H9V4H8V1H9V0H11V1H12V2H13V7H12V8H11V9H9V10H4V9H1V8H0Z\" fill=\"var(--cat-color)\"/></g>\n        </g>\n      </g>\n\n      <!-- Body — 맨 뒤 레이어 (먼저 그려서 다른 모든 부위가 그 위에 깔림) -->\n      <g class=\"hunting-body-grow\">\n        <g id=\"idle-body\" fill=\"var(--cat-color)\" data-patch-frame=\"3 19 1 1\">\n          <path transform=\"translate(3 19)\" d=\"M15 0V1H18V2H20V3H21V6H22V11H21V14H19V15H3V14H1V11H0V6H1V3H2V2H4V1H7V0H15Z\"/>\n          <g class=\"patches\" clip-path=\"url(#idle-body-clip)\"></g>\n        </g>\n      </g>\n\n      <!-- 앞다리 (default.svg 참고) — 좌/우 따로 색칠 (legFl/legFr 키 분리) -->\n      <g id=\"idle-legs\" fill=\"var(--cat-color)\">\n        <g id=\"idle-leg-fl\" data-patch-frame=\"6 25 1 1\">\n          <path d=\"M6 29V26H7V25H10V26H11V28H12V31H13V32H14V35H13V36H9V35H8V31H7V29H6Z\"/>\n          <g class=\"patches\" clip-path=\"url(#idle-leg-fl-clip)\"></g>\n        </g>\n        <g id=\"idle-leg-fr\" data-patch-frame=\"15 25 1 1\">\n          < width=\"3\" height=\"3\" x=\"12\" y=\"15\" fill=\"var(--eye-color-left, var(--eye-color, var(--cat-color)))\"/>\n</g>\n\n  <g class=\"steam-g\" fill=\"#c9c9ce\">\n    <rect class=\"stm s1\" x=\"16\" y=\"-1\" width=\"1.6\" height=\"1.6\"/>\n    <rect class=\"stm s2\" x=\"20\" y=\"-3\" width=\"2\" height=\"2\"/>\n    <rect class=\"stm s3\" x=\"24\" y=\"-1\" width=\"1.6\" height=\"1.6\"/>\n  </g>\n</svg>\n","stretch.svg":"<svg viewBox=\"-10 -2 72 56\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n<defs>\n  <style>\n    :root {\n      --cat-color: #1A1A1A;\n      --cat-outline: #FFFFFF;\n      --hunting-look-x: 0px;\n      --hunting-look-y: 0px;\n      --hunting-pupil-x: 0px;\n      --hunting-pupil-y: 0px;\n    }\n    svg {\n      overflow: visible;\n    }\n\n    /* 부위별 회전축 — 패턴 patches가 들어와도 bbox가 변해 축이 밀리지 않도록\n       viewBox 좌표계의 고정 px origin을 사용한다. */\n    #leg-fl, #leg-fr, #leg-rl, #leg-rr,\n    #body, #head-group, #tail {\n      transform-box: view-box;\n    }\n    #leg-fl     { transform-origin: 11.5px 22px; }  /* 어깨 (위쪽 중앙) */\n    #leg-fr     { transform-origin: 20.5px 22px; }\n    #leg-rl     { transform-origin: 30px 33.5px; }\n    #leg-rr     { transform-origin: 38px 33.5px; }\n    #body       { transform-origin: 29px 24.5px; }\n    #head-group { transform-origin: 15px 24px; }\n    #tail       { transform-origin: 39px 21px; }    /* 시작점 (몸통 연결부) */\n\n    /* stretching 클래스 시 부위별 keyframe 재생 (3s) */\n    .stretching #leg-fl,\n    .stretching #leg-fr,\n    .stretching #leg-rl,\n    .stretching #leg-rr,\n    .stretching #body,\n    .stretching #head-group,\n    .stretching #tail {\n      animation-duration: 3s;\n      animation-timing-function: ease-in-out;\n      animation-fill-mode: both;\n      animation-iteration-count: 1;\n    }\n    .stretching #leg-fl     { animation-name: stretch-fl; }\n    .stretching #leg-fr     { animation-name: stretch-fr; }\n    .stretching #leg-rl     { animation-name: stretch-rl; }\n    .stretching #leg-rr     { animation-name: stretch-rr; }\n    .stretching #body       { animation-name: stretch-body; }\n    .stretching #head-group { animation-name: stretch-head; }\n    .stretching #tail       { animation-name: stretch-tail; }\n\n    :root.hunting #leg-fl { transform: translate(4px, 8.7px) rotate(51deg) scaleY(0.69); }\n    :root.hunting #leg-fr { transform: translate(2px, 9.7px) rotate(51deg) scaleY(0.69); }\n    :root.hunting #leg-rl { transform-origin: 30px 41px; animation: hunting-leg-rl 0.82s steps(2, end) infinite; }\n    :root.hunting #leg-rr { transform-origin: 38px 41px; animation: hunting-leg-rr 0.82s steps(2, end) infinite; }\n    :root.hunting #head-group {\n      transform: translate(calc(5px + var(--hunting-look-x)), calc(4px + var(--hunting-look-y)));\n    }\n    :root.hunting #body { animation: hunting-stretch-body 0.82s steps(2, end) infinite; }\n    :root.hunting #tail { animation: hunting-stretch-tail 0.48s steps(2, end) infinite; }\n    :root.hunting #cat-content { animation: hunting-shiver 0.82s steps(2, end) infinite; }\n    :root.hunting #eyes-open { opacity: 1; }\n    :root.hunting #eyes-closed { opacity: 0; }\n    :root.hunting .hunting-pupil-track {\n      transform: translate(var(--hunting-pupil-x), var(--hunting-pupil-y));\n    }\n\n    /* 앞다리 좌측: 발 위치 좌측+살짝 아래 */\n    @keyframes stretch-fl {\n      0%, 100% { transform: translate(0, 0) rotate(0deg) scaleY(1); }\n      30%, 70% { transform: translate(4px, 8.7px) rotate(51deg) scaleY(0.69); }\n    }\n    /* 앞다리 우측: 동일 패턴 */\n    @keyframes stretch-fr {\n      0%, 100% { transform: translate(0, 0) rotate(0deg) scaleY(1); }\n      30%, 70% { transform: translate(2px, 9.7px) rotate(51deg) scaleY(0.69); }\n    }\n    /* 뒷다리: 우상으로 이동 (delta +7, -2) */\n    @keyframes stretch-rl {\n      0%, 100% { transform: translate(0, 0); }\n      30%, 70% { transform: translate(7px, -2px); }\n    }\n    @keyframes stretch-rr {\n      0%, 100% { transform: translate(0, 0); }\n      30%, 70% { transform: translate(7px, -2px); }\n    }\n    /* 몸통: bbox 크기 같음, 단순 translate(5, 1) — 우하로 살짝 */\n    @keyframes stretch-body {\n      0%, 100% { transform: translate(0, 0); }\n      30%, 70% { transform: translate(5px, 1px); }\n    }\n    /* 머리: center delta (+5, +4) */\n    @keyframes stretch-head {\n      0%, 100% { transform: translate(0, 0); }\n      30%, 70% { transform: translate(5px, 4px); }\n    }\n    /* 꼬리: 시작점(몸통 연결부)에서 살짝 들리듯 — 작게 회전 + 미세 이동 */\n    @keyframes stretch-tail {\n      0%, 100% { transform: rotate(0deg) translate(0, 0); }\n      30%, 70% { transform: rotate(-10deg) translate(1px, -2px); }\n    }\n    @keyframes hunting-stretch-body {\n      0%, 100% { transform: translate(5px, 1px); }\n      25% { transform: translate(4px, 1px); }\n      50% { transform: translate(6.2px, 0.7px); }\n      75% { transform: translate(4.3px, 1.2px); }\n    }\n    @keyframes hunting-leg-rl {\n      0%, 100% { transform: translate(7px, -2px) rotate(0deg); }\n      25% { transform: translate(7px, -2px) rotate(3deg); }\n      50% { transform: translate(7px, -2px) rotate(-4deg); }\n      75% { transform: translate(7px, -2px) rotate(2deg); }\n    }\n    @keyframes hunting-leg-rr {\n      0%, 100% { transform: translate(7px, -2px) rotate(0deg); }\n      25% { transform: translate(7px, -2px) rotate(-3deg); }\n      50% { transform: translate(7px, -2px) rotate(4deg); }\n      75% { transform: translate(7px, -2px) rotate(-2deg); }\n    }\n    @keyframes hunting-stretch-tail {\n      0%, 100% { transform: rotate(-14deg) translate(1px, -2px); }\n      50% { transform: rotate(8deg) translate(1px, -2px); }\n    }\n    @keyframes hunting-shiver {\n      0%, 100% { transform: translate(0, 0); }\n      50% { transform: translate(0.3px, 0.1px); }\n    }\n\n    /* 눈 — 평상시 open, 정점(30~70%) 동안 closed (squint 모양) */\n    #eyes-closed { opacity: 0; }\n    .stretching #eyes-open  { animation: eyes-toggle-open  3s linear both; }\n    .stretching #eyes-closed { animation: eyes-toggle-close 3s linear both; }\n    @keyframes eyes-toggle-open {\n      0%, 25%, 75%, 100% { opacity: 1; }\n      30%, 70% { opacity: 0; }\n    }\n    @keyframes eyes-toggle-close {\n      0%, 25%, 75%, 100% { opacity: 0; }\n      30%, 70% { opacity: 1; }\n    }\n\n    /* 몸 떨림 (shiver) — 정점 구간(30~70%)에 작은 진동\n       cat-content 전체에 transform 적용해 모든 부위가 같이 떨림 */\n    .stretching #cat-content { animation: shiver 3s linear both; }\n    @keyframes shiver {\n      0%, 30%, 70%, 100% { transform: translate(0, 0); }\n      33%  { transform: translate(-0.4px, 0.2px); }\n      36%  { transform: translate(0.3px, -0.3px); }\n      39%  { transform: translate(-0.3px, 0.3px); }\n      42%  { transform: translate(0.4px, -0.2px); }\n      45%  { transform: translate(-0.2px, 0.4px); }\n      48%  { transform: translate(0.3px, 0.2px); }\n      51%  { transform: translate(-0.4px, -0.1px); }\n      54%  { transform: translate(0.2px, 0.3px); }\n      57%  { transform: translate(-0.3px, -0.3px); }\n      60%  { transform: translate(0.4px, 0.1px); }\n      63%  { transform: translate(-0.2px, -0.4px); }\n      66%  { transform: translate(0.3px, 0.3px); }\n    }\n  </style>\n  <filter id=\"st-cat-outline\" x=\"-20%\" y=\"-20%\" width=\"140%\" height=\"140%\">\n    <feMorphology operator=\"dilate\" radius=\"1\" in=\"SourceAlpha\" result=\"dilated\"/>\n    <feFlood flood-color=\"var(--cat-outline)\" result=\"flood\"/>\n    <feComposite in=\"flood\" in2=\"dilated\" operator=\"in\" result=\"outline\"/>\n    <feMerge>\n      <feMergeNode in=\"outline\"/>\n      <feMergeNode in=\"SourceGraphic\"/>\n    </feMerge>\n  </filter>\n  <filter id=\"st-eye-outline\" x=\"-50%\" y=\"-50%\" width=\"200%\" height=\"200%\">\n    <feMorphology operator=\"dilate\" radius=\"1\" in=\"SourceAlpha\" result=\"dilated\"/>\n    <feFlood flood-color=\"#F5F5F5\" result=\"flood\"/>\n    <feComposite in=\"flood\" in2=\"dilated\" operator=\"in\" result=\"outline\"/>\n    <feMerge>\n      <feMergeNode in=\"outline\"/>\n      <feMergeNode in=\"SourceGraphic\"/>\n   const H = {};
  window.petApi = {
    readAsset: (n) => ASSETS[n],
    onCursor: (cb) => { document.addEventListener("mousemove", (e) => cb({ x: e.clientX, y: e.clientY })); },
    onTypingRate: (cb) => (H.rate = cb),
    onTypingUnavailable: () => {},
    onMood: (cb) => (H.mood = cb),
    onReminder: (cb) => (H.rem = cb),
    saveEntry: () => Promise.resolve({}),
    getToday: () => Promise.resolve({ date: "", entries: [] }),
    moveWindow: () => {},
    ensureOnScreen: () => {},
  };
  window.addEventListener("load", () => {
    const bar = document.createElement("div");
    bar.style.cssText = "position:fixed;top:8px;left:8px;display:flex;gap:6px;z-index:99";
    for (const [label, fn] of [
      ["idle", () => { H.rate(0); H.mood("content"); }],
      ["typing", () => { H.rate(2.5); H.mood("content"); }],
      ["overheat", () => { H.rate(5); H.mood("content"); }],
      ["lonely", () => { H.rate(0); H.mood("lonely"); }],
      ["grumpy", () => { H.rate(0); H.mood("grumpy"); }],
      ["reminder", () => H.rem({ reflection: false })],
      ["purr", () => { document.documentElement.classList.add("purring"); setTimeout(() => document.documentElement.classList.remove("purring"), 2500); }],
    ]) {
      const b = document.createElement("button");
      b.textContent = label; b.onclick = fn; bar.appendChild(b);
    }
    document.body.appendChild(bar);
  });
</script>
