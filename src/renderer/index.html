<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #cat-stage {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 160px;
      margin-left: -80px;
      height: 170px;
      cursor: grab;
    }
    #cat-elastic {
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 150px;
      height: 150px;
      margin-left: -75px;
      transform-origin: 50% 100%;
      will-change: transform;
    }
    #cat-bounce { width: 100%; height: 100%; }
    #cat-stage.excited #cat-bounce {
      animation: pet-bounce 0.45s ease-in-out infinite;
      transform-origin: 50% 100%;
    }
    @keyframes pet-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
    .pose {
      position: absolute;
      inset: 0;
      display: none;
    }
    .pose.visible { display: block; }
    .pose svg { width: 100%; height: 100%; }
    .pose.pose-drag {
      position: absolute;
      inset: auto;
      left: 50%;
      bottom: 4px;
      width: 200px;
      height: 370px;
      margin-left: -100px;
      cursor: grabbing;
    }

    .stm { opacity: 0; }
    #cat-stage.hot .stm { animation: pet-steam 1.5s ease-out infinite; }
    #cat-stage.hot .s2 { animation-delay: 0.45s; }
    #cat-stage.hot .s3 { animation-delay: 0.9s; }
    @keyframes pet-steam {
      0% { opacity: 0; transform: translateY(0); }
      25% { opacity: 0.85; }
      100% { opacity: 0; transform: translateY(-7px); }
    }

    #cat-stage.lonely .eye-l-blink,
    #cat-stage.lonely .eye-r-blink { transform: scaleY(0.45); }
    #cat-stage.lonely [id$="-ear-left"] {
      transform: rotate(-16deg); transform-origin: 8px 10px;
    }
    #cat-stage.lonely [id$="-ear-right"] {
      transform: rotate(16deg); transform-origin: 20px 10px;
    }
    .brow { opacity: 0; }
    #cat-stage.grumpy .brow { opacity: 1; }
    #cat-stage.grumpy [id$="-ear-left"] {
      transform: scaleY(0.5); transform-origin: 8px 10px;
    }
    #cat-stage.grumpy [id$="-ear-right"] {
      transform: scaleY(0.5); transform-origin: 20px 10px;
    }

    #popup {
      position: absolute;
      bottom: 180px;
      left: 10px;
      width: 300px;
      max-height: 290px;
      background: #ffffff;
      border: 2px solid #1a1a1a;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
      padding: 12px;
      box-sizing: border-box;
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    #popup.visible { display: flex; }
    #popup h3 { margin: 0; font-size: 13px; color: #1a1a1a; }
    #entries {
      overflow-y: auto;
      max-height: 120px;
      font-size: 12px;
      color: #333;
      display: none;
    }
    #entries.visible { display: block; }
    #entries .entry { margin-bottom: 5px; line-height: 1.35; }
    #entries .entry .t { color: #999; font-variant-numeric: tabular-nums; margin-right: 5px; }
    #noteInput {
      width: 100%;
      box-sizing: border-box;
      min-height: 54px;
      resize: none;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      padding: 7px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    #noteInput:focus { border-color: #1a1a1a; }
    #popupFooter { display: flex; justify-content: space-between; align-items: center; }
    #hint { font-size: 10px; color: #aaa; }
    #saveBtn {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
    }
    #saveBtn:hover { background: #d94f3d; }
    #toast {
      position: absolute;
      bottom: 155px;
      left: 10px;
      width: 300px;
      box-sizing: border-box;
      background: rgba(26, 26, 26, 0.92);
      color: #fff;
      font-size: 11px;
      line-height: 1.4;
      border-radius: 10px;
      padding: 8px 10px;
      display: none;
    }
    #toast.visible { display: block; }
  </style>
</head>
<body>
  <div id="popup">
    <h3 id="popupTitle">Quick note</h3>
    <div id="entries"></div>
    <textarea id="noteInput" placeholder="What just happened?"></textarea>
    <div id="popupFooter">
      <span id="hint">⌘/Ctrl+Enter to save · Esc to close</span>
      <button id="saveBtn">Save</button>
    </div>
  </div>
  <div id="toast"></div>
  <div id="cat-stage">
    <div id="cat-elastic"><div id="cat-bounce"></div></div>
  </div>
  <script src="../../dist/renderer/renderer.js"></script>
</body>
</html>
