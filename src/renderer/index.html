<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #cat-stage {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 160px;
      margin-left: -80px;
      height: 170px;
      cursor: grab;
    }
    #cat-elastic {
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 150px;
      height: 150px;
      margin-left: -75px;
      transform-origin: 50% 100%;
      will-change: transform;
    }
    #cat-bounce { width: 100%; height: 100%; }
    #cat-stage.excited #cat-bounce {
      animation: pet-bounce 0.45s ease-in-out infinite;
      transform-origin: 50% 100%;
    }
    @keyframes pet-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
    .pose {
      position: absolute;
      inset: 0;
      display: none;
    }
    .pose.visible { display: block; }
    .pose svg { width: 100%; height: 100%; }
    .pose.pose-drag {
      position: absolute;
      inset: auto;
      left: 50%;
      bottom: -6px;
      width: 200px;
      height: 370px;
      margin-left: -109px;
      cursor: grabbing;
    }

    .stm { opacity: 0; }
    #cat-stage.hot .stm { animation: pet-steam 1.5s ease-out infinite; }
    #cat-stage.hot .s2 { animation-delay: 0.45s; }
    #cat-stage.hot .s3 { animation-delay: 0.9s; }
    @keyframes pet-steam {
      0% { opacity: 0; transform: translateY(0); }
      25% { opacity: 0.85; }
      100% { opacity: 0; transform: translateY(-7px); }
    }

    #cat-stage.lonely .eye-l-blink,
    #cat-stage.lonely .eye-r-blink { transform: scaleY(0.45); }
    #cat-stage.lonely [id$="-ear-left"] {
      transform: rotate(-16deg); transform-origin: 8px 10px;
    }
    #cat-stage.lonely [id$="-ear-right"] {
      transform: rotate(16deg); transform-origin: 20px 10px;
    }
    .brow { opacity: 0; }
    #cat-stage.grumpy .brow { opacity: 1; }
    #cat-stage.grumpy [id$="-ear-left"] {
      transform: scaleY(0.5); transform-origin: 8px 10px;
    }
    #cat-stage.grumpy [id$="-ear-right"] {
      transform: scaleY(0.5); transform-origin: 20px 10px;
    }

    #popup {
      position: absolute;
      bottom: 180px;
      left: 90px;
      width: 300px;
      max-height: 300px;
      background: #f4f1e8;
      border: 3px solid #1a1a1a;
      box-shadow: 5px 5px 0 #1a1a1a;
      box-sizing: border-box;
      display: none;
      flex-direction: column;
      font-family: 'Menlo', 'Courier New', monospace;
      image-rendering: pixelated;
    }
    #popup.visible { display: flex; }
    #popupHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1a1a;
      padding: 6px 8px;
      flex-shrink: 0;
    }
    #popup h3 {
      margin: 0;
      font-size: 11px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    #closeBtn {
      width: 18px;
      height: 18px;
      padding: 0;
      background: #d94f3d;
      color: #fff;
      border: 2px solid #fff;
      font-family: inherit;
      font-size: 10px;
      font-weight: bold;
      line-height: 1;
      cursor: pointer;
    }
    #closeBtn:hover { background: #fff; color: #d94f3d; border-color: #d94f3d; }
    #popupBody {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      overflow: hidden;
      min-height: 0;
    }
    #entries {
      overflow-y: auto;
      max-height: 110px;
      font-size: 11px;
      color: #1a1a1a;
      border: 2px dashed #b9b4a4;
      padding: 6px;
      display: none;
    }
    #entries.visible { display: block; flex: 0 1 auto; min-height: 38px; }
    #noteInput, #popupFooter { flex-shrink: 0; }
    #entries .entry { margin-bottom: 5px; line-height: 1.4; }
    #entries .entry .t { color: #8a8574; font-variant-numeric: tabular-nums; margin-right: 5px; }
    #noteInput {
      width: 100%;
      box-sizing: border-box;
      min-height: 58px;
      resize: none;
      border: 2px solid #1a1a1a;
      border-radius: 0;
      background: #ffffff;
      padding: 7px;
      font-size: 12px;
      font-family: inherit;
      color: #1a1a1a;
      outline: none;
      box-shadow: inset 2px 2px 0 rgba(26, 26, 26, 0.12);
    }
    #noteInput:focus { border-color: #d94f3d; }
    #noteInput::placeholder { color: #a39e8d; }
    #popupFooter { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    #hint { font-size: 9px; color: #8a8574; line-height: 1.3; }
    #saveBtn {
      background: #d94f3d;
      color: #fff;
      border: 2px solid #1a1a1a;
      border-radius: 0;
      box-shadow: 3px 3px 0 #1a1a1a;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #saveBtn:hover { background: #e8654f; }
    #saveBtn:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }
    #toast {
      position: absolute;
      bottom: 155px;
      left: 50%;
      margin-left: -150px;
      width: 300px;
      box-sizing: border-box;
      background: rgba(26, 26, 26, 0.92);
      color: #fff;
      font-size: 11px;
      line-height: 1.4;
      border-radius: 10px;
      padding: 8px 10px;
      display: none;
    }
    #toast.visible { display: block; }
  </style>
</head>
<body>
  <div id="popup">
    <div id="popupHeader">
      <h3 id="popupTitle">Quick note</h3>
      <button id="closeBtn" title="Close (Esc)">✕</button>
    </div>
    <div id="popupBody">
      <div id="entries"></div>
      <textarea id="noteInput" placeholder="What just happened?"></textarea>
      <div id="popupFooter">
        <span id="hint">⌘/Ctrl+Enter save · Esc close</span>
        <button id="saveBtn">Save</button>
      </div>
    </div>
  </div>
  <div id="toast"></div>
  <div id="cat-stage">
    <div id="cat-elastic"><div id="cat-bounce"></div></div>
  </div>
  <script src="../../dist/renderer/renderer.js"></script>
</body>
</html>
